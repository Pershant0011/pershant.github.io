<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Projects | Loft</title>
    <link rel="stylesheet" href="projects-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background-color: #ffffff;
}

.pk-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
}

.pk-project-section {
    padding: 100px 0;
}

.pk-header {
    text-align: center;
    margin-bottom: 60px;
}

.pk-tag {
    color: #1339ac;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 2px;
}

.pk-main-title {
    font-size: 42px;
    font-weight: 800;
    color: #222;
    margin: 10px 0;
}

.pk-main-title span {
    color: #ffb400;
}

.pk-description {
    color: #666;
    max-width: 650px;
    margin: 0 auto;
    line-height: 1.6;
}

.pk-project-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

.pk-project-card {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    height: 350px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.pk-img-box {
    width: 100%;
    height: 100%;
}

.pk-img-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: 0.5s ease;
}

.pk-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(to top, rgba(19, 57, 172, 0.9), transparent);
    display: flex;
    align-items: flex-end;
    padding: 30px;
    opacity: 0;
    transition: 0.4s ease;
}

.pk-overlay-text h4 {
    color: #fff;
    font-size: 20px;
    font-weight: 700;
}

.pk-overlay-text span {
    color: #ffb400;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
}

.pk-project-card:hover .pk-overlay {
    opacity: 1;
}

.pk-project-card:hover .pk-img-box img {
    transform: scale(1.15);
}

.pk-action-bar {
    text-align: center;
    margin-top: 50px;
}

.pk-view-all-btn {
    background-color: #1339ac;
    color: #fff;
    border: none;
    padding: 15px 40px;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
}

.pk-view-all-btn:hover {
    background-color: #ffb400;
    color: #000;
    transform: translateY(-3px);
}

@media (max-width: 768px) {
    .pk-main-title {
        font-size: 32px;
    }
    .pk-project-section {
        padding: 60px 0;
    }
}
    </style>
</head>
<body>

<section class="pk-project-section">
    <div class="pk-container">
        <div class="pk-header">
            <span class="pk-tag">OUR PORTFOLIO</span>
            <h2 class="pk-main-title">View Our <span>Recent Projects</span></h2>
            <p class="pk-description">Explore the transformation of spaces we have cleaned and maintained with 100% customer satisfaction.</p>
        </div>

        <div class="pk-project-grid">
            <div class="pk-project-card">
                <div class="pk-img-box">
                    <img src="rooming.jpg">
                    <div class="pk-overlay">
                        <div class="pk-overlay-text">
                            <h4>Office Deep Clean</h4>
                            <span>Commercial</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pk-project-card">
                <div class="pk-img-box">
                    <img src="tv.webp">
                    <div class="pk-overlay">
                        <div class="pk-overlay-text">
                            <h4>Home Sanitization</h4>
                            <span>Residential</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pk-project-card">
                <div class="pk-img-box">
                    <img src="door.jfif">
                    <div class="pk-overlay">
                        <div class="pk-overlay-text">
                            <h4>Glass Sparkling</h4>
                            <span>Windows</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pk-project-card">
                <div class="pk-img-box">
                    <img src="kicthen.jpg">
                    <div class="pk-overlay">
                        <div class="pk-overlay-text">
                            <h4>Industrial Kitchen</h4>
                            <span>Specialized</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="pk-action-bar">
            <button class="pk-view-all-btn">View All Projects</button>
        </div>
    </div>
</section>

</body>
</html>
